<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOTWIRE+ | Access Premium Bookings</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">

  <div class="login-card">
    <a href="index.html" class="logo text-center" style="display:inline-flex; justify-content:center; margin-bottom:24px;">
      <div class="logo-flame">
        <i class="fa-solid fa-fire"></i>
      </div>
      HOTWIRE<span class="logo-plus">+</span>
    </a>

    <h2 style="font-size:24px; font-weight:800; margin-bottom:8px; color:white;">Welcome Back</h2>
    <p style="color:var(--text-muted-dark); font-size:13.5px; margin-bottom:32px;">Access unpublished rates and premium member rewards.</p>

    <form onsubmit="handleLogin(event)">
      <div class="form-group" style="text-align:left; margin-bottom:16px;">
        <label class="form-label" style="color:var(--text-muted-dark);">Email Address</label>
        <input type="email" class="form-control" style="background:rgba(255,255,255,0.05); border-color:var(--border-dark); color:white;" placeholder="name@domain.com" required>
      </div>

      <div class="form-group" style="text-align:left; margin-bottom:24px;">
        <div class="d-flex justify-content-between">
          <label class="form-label" style="color:var(--text-muted-dark);">Password</label>
          <a href="#" style="font-size:12px; color:var(--accent-color); font-weight:500;">Forgot?</a>
        </div>
        <input type="password" class="form-control" style="background:rgba(255,255,255,0.05); border-color:var(--border-dark); color:white;" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; height:48px; margin-bottom:16px;">Log In</button>
    </form>

    <button class="btn btn-outline-white" style="width:100%; height:48px; font-size:13.5px; border-color:rgba(255,255,255,0.15);" onclick="window.location.href='index.html'">
      <i class="fa-brands fa-google"></i> Continue with Google
    </button>

    <p style="color:var(--text-muted-dark); font-size:13.5px; margin-top:24px;">
      New to HOTWIRE+? <a href="#" style="color:var(--accent-color); font-weight:600;">Create account</a>
    </p>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // Mock log in success
      localStorage.setItem('user_logged_in', 'true');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
